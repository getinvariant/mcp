# gitleaks config for Invariant
# Run locally: `gitleaks protect --staged --config .gitleaks.toml`
# Run in CI:   `gitleaks detect --config .gitleaks.toml`
#
# Install: `brew install gitleaks` (macOS) or see https://github.com/gitleaks/gitleaks

title = "invariant gitleaks config"

# Inherit gitleaks' built-in rules (covers AWS, GCP, Stripe, GitHub tokens, etc.)
[extend]
useDefault = true

# ─── Custom rules ──────────────────────────────────────────────────────────────

[[rules]]
id = "pl-api-key"
description = "Invariant API key (pl_ prefix)"
regex = '''pl_[a-zA-Z0-9]{16,}'''
keywords = ["pl_"]
tags = ["invariant", "key"]

[[rules]]
id = "supabase-service-key"
description = "Supabase service role JWT"
regex = '''eyJ[a-zA-Z0-9_-]{20,}\.eyJ[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}'''
keywords = ["service_role", "SUPABASE_SERVICE_KEY"]
tags = ["supabase"]

[[rules]]
id = "upstash-redis-token"
description = "Upstash Redis REST token"
regex = '''A[A-Za-z0-9]{40,}AAAA'''
keywords = ["UPSTASH_REDIS_REST_TOKEN", "upstash"]
tags = ["upstash"]

[[rules]]
id = "anthropic-key"
description = "Anthropic API key"
regex = '''sk-ant-[a-zA-Z0-9_-]{20,}'''
keywords = ["sk-ant-"]
tags = ["anthropic"]

[[rules]]
id = "openai-key"
description = "OpenAI API key"
regex = '''sk-(?:proj-)?[a-zA-Z0-9_-]{20,}'''
keywords = ["sk-"]
tags = ["openai"]

# ─── Allowlist ─────────────────────────────────────────────────────────────────
# Things that look like secrets but aren't.

[allowlist]
description = "Documentation, examples, and known-safe placeholders"
paths = [
  '''\.gitleaks\.toml''',
  '''\.env\.example''',
  '''README\.md''',
  '''docs/.*''',
]
regexes = [
  '''pl_your_key_here''',
  '''pl_their_key_here''',
  '''pl_YOUR_KEY''',
  '''pl_THEIR_KEY''',
  '''pl_test_key''',
  '''sk-ant-your-key-here''',
  '''sk-your-key-here''',
]
